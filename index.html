<html>
  
  <head>
    <title>NetMail</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script> 
  </head>

  <body>
    <!-- CRT overlay/effect/background -->
    <img src="imgs/bezel.png" class="bezel" alt="">
    <div class="center crt-screen">
      <img src="imgs/wallpaper.png" id="wallpaper" alt="">
      <div class="crt-roll"></div>
      <div class="crt-roll crt-roll2"></div>

      <!-- starting message with typewriter effect -->
      <div class="typewriter" id = "start-msg" ></div>
      
      <!-- mail notification and gif -->
      <div id="mail-msg">You  Have  Mail</div>
      <img src="imgs/mailbox.gif" id="mailbox" alt="">

      <!-- chat log and textarea for user input -->
      <div id="chat-log">Mist: It's been so long since I've had someone to talk to. Do you want to hear a fun fact? Yes or no?</div>
      <textarea id="user-input" onkeypress="userType(event);"></textarea>

      <!-- ending message with typewriter effect -->
      <div class="typewriter" id = "end-msg"></div>
    </div>
  </body>

</html>
